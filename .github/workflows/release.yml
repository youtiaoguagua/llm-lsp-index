name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lsp-index
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lsp-index.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lsp-index
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lsp-index

    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set version
      id: vars
      shell: bash
      run: |
        VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-apple-darwin' && matrix.os == 'macos-latest'
      run: rustup target add aarch64-apple-darwin

    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --bin lsp-index

    - name: Build HTTP binary
      run: cargo build --release --target ${{ matrix.target }} --bin lsp-index-http

    - name: Package
      shell: bash
      run: |
        VERSION=${{ steps.vars.outputs.version }}
        mkdir -p dist
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          cp target/${{ matrix.target }}/release/lsp-index.exe dist/
          cp target/${{ matrix.target }}/release/lsp-index-http.exe dist/
          cd dist
          7z a lsp-index-${VERSION}-${{ matrix.target }}.zip lsp-index.exe lsp-index-http.exe
        else
          cp target/${{ matrix.target }}/release/lsp-index dist/
          cp target/${{ matrix.target }}/release/lsp-index-http dist/
          cd dist
          tar czvf lsp-index-${VERSION}-${{ matrix.target }}.tar.gz lsp-index lsp-index-http
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsp-index-${{ matrix.target }}
        path: dist/lsp-index-*.{tar.gz,zip}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.build.outputs.version }}
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: get_version
      shell: bash
      run: |
        VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
        VERSION=${VERSION#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $VERSION"

    - name: Update package.json version
      working-directory: ./npm-package
      shell: bash
      run: |
        CURRENT_VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[:space:]')
        if [ "$CURRENT_VERSION" != "${{ steps.get_version.outputs.VERSION }}" ]; then
          npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version
        fi

    - name: Publish to npm
      uses: JS-DevTools/npm-publish@v3
      with:
        package: ./npm-package
        access: public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
